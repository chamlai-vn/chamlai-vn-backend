# lefthook.yml — Git hooks for chamlai-vn
# Docs: https://lefthook.dev

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: |
        unformatted=$(gofmt -l {staged_files})
        if [ -n "$unformatted" ]; then
          echo "❌ unformatted files (run 'gofmt -w' or 'make fmt'):"
          echo "$unformatted"
          exit 1
        fi

    # 2. go vet — static analysis
    vet:
      run: go vet ./...

    # 3. golangci-lint - only lint staged files for speed
    lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD

    # 4. gitleaks — scan secret in staged diff
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact

