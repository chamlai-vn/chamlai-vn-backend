root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  entrypoint = ["./tmp/main"]
  # For production build with swagger: CGO_ENABLED=0 go build -tags swagger -ldflags='-s -w' -o ./tmp/main ./cmd/api/
  # CGO_ENABLED=0: Pure Go build, matches warm-cache.sh for cache sharing
  # -buildvcs=false: Prevent cache invalidation on git operations
  # -trimpath: Required for cache sharing with warm-cache.sh
  # -p=10: Use all CPU cores for parallel compilation
  cmd = "CGO_ENABLED=0 go build -tags swagger -mod=readonly -buildvcs=false -trimpath -p=10 -o ./tmp/main ./cmd/api/"
  delay = 500
  exclude_dir = ["tmp", ".git", ".vscode", ".claude", "docs", "deployment", "benchmark", "scripts", "internal/api/swagger", "cmd/crawler", "cmd/migration", "cmd/seed"]
  exclude_file = ["*.html", "*.pdf", "*.xlsx", "*.csv"]
  exclude_regex = [".*_test\\.go$", ".*\\.out$", ".*\\.log$"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "3s"
  log = "build-errors.log"
  poll = false
  poll_interval = 1000
  rerun = false
  rerun_delay = 1000
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  # Show log time
  time = true
  # Only show main log (silences watcher, build, runner)
  main_only = false
  # silence all logs produced by air
  silent = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = false
