# fly.toml app configuration file generated for chamlai-vn-backend on 2026-07-13T10:05:42+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chamlai-vn-backend'
primary_region = 'sin'

[build]
  dockerfile = "deployment/docker/Dockerfile"   # context stays repo root

[env]
  PORT = '8080'
  ALLOW_ORIGINS = 'https://demo.chamlai.vn'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"              # generous enough for DB pool warm-up on cold start
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
